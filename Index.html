<!DOCTYPE html>
<html lang="en" class="antialiased bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSF Mobile-Ready Photo Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .cropper-view-box { outline: 2px solid #10b981; border-radius: 4px; box-shadow: 0 0 0 9999px rgba(255, 255, 255, 0.85); }
        .cropper-line { background-color: transparent; }
        .cropper-point { background-color: #10b981; width: 10px; height: 10px; border-radius: 50%; }
        .cropper-center { display: none; }
        .cropper-bg { background-image: none; background-color: #f8fafc; }
        
        /* Custom range slider styling */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #10b981; cursor: pointer; margin-top: -6px; shadow: 0 1px 3px rgba(0,0,0,0.3); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #cbd5e1; border-radius: 2px; }
        
        /* Hide scrollbar for mobile toolbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <nav class="bg-white px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-md">
                <i class="fa-solid fa-camera-retro text-lg"></i>
            </div>
            <div>
                <h1 class="text-sm md:text-base font-black uppercase tracking-wider text-slate-900 leading-none">SSF Photo Studio</h1>
                <p class="text-[9px] md:text-[10px] font-mono text-emerald-600 mt-1 tracking-widest uppercase">High-Res Photo Editor</p>
            </div>
        </div>
        <button id="clearBtn" class="hidden bg-rose-50 text-rose-600 px-3 md:px-4 py-2 rounded-lg text-xs font-bold hover:bg-rose-100 transition-colors flex items-center gap-2 border border-rose-200">
            <i class="fa-solid fa-trash-can"></i> <span class="hidden md:inline">Discard</span>
        </button>
    </nav>

    <main class="flex-1 w-full max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
        
        <div class="lg:col-span-8 flex flex-col gap-4">
            
            <div id="dropZone" class="w-full h-[60vh] md:h-[500px] border-2 border-dashed border-emerald-300 bg-emerald-50 hover:bg-emerald-100 rounded-3xl flex flex-col items-center justify-center cursor-pointer transition-colors group relative overflow-hidden">
                <div class="w-20 h-20 bg-white shadow-lg rounded-full flex items-center justify-center mb-4 group-hover:-translate-y-2 transition-transform duration-300 relative z-10">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-emerald-500"></i>
                </div>
                <h3 class="text-lg md:text-xl font-black text-slate-800 uppercase tracking-tight relative z-10 text-center px-4">Upload Original Photo</h3>
                <p class="text-xs md:text-sm text-slate-500 mt-2 font-medium relative z-10 text-center px-4">Tap to select from phone gallery or camera</p>
                <input type="file" id="imageUpload" accept="image/*" class="hidden">
            </div>

            <div id="workspaceContainer" class="hidden flex-col gap-4">
                
                <div class="w-full h-[55vh] md:h-[500px] bg-slate-200 rounded-3xl overflow-hidden shadow-inner relative border border-slate-300">
                    <img id="imageWorkspace" src="" class="max-w-full hidden">
                </div>

                <div class="bg-white p-2 rounded-2xl flex items-center gap-2 shadow-sm border border-slate-200 overflow-x-auto no-scrollbar justify-start md:justify-center">
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-600 transition-colors border border-slate-100" data-action="zoom-in" title="Zoom In"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-600 transition-colors border border-slate-100" data-action="zoom-out" title="Zoom Out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                    <div class="w-px h-6 bg-slate-200 mx-1 shrink-0"></div>
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-600 transition-colors border border-slate-100" data-action="rotate-left" title="Rotate Left"><i class="fa-solid fa-rotate-left"></i></button>
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-600 transition-colors border border-slate-100" data-action="rotate-right" title="Rotate Right"><i class="fa-solid fa-rotate-right"></i></button>
                    <div class="w-px h-6 bg-slate-200 mx-1 shrink-0"></div>
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-600 transition-colors border border-slate-100" data-action="flip-x" title="Flip Horizontal"><i class="fa-solid fa-arrows-left-right"></i></button>
                    <div class="w-px h-6 bg-slate-200 mx-1 shrink-0"></div>
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-amber-50 text-slate-600 hover:text-amber-500 transition-colors border border-slate-100" data-action="toggle-guides" title="Toggle Grid"><i class="fa-solid fa-border-all"></i></button>
                    <button class="tool-btn w-10 h-10 shrink-0 rounded-xl bg-slate-50 hover:bg-rose-50 text-slate-600 hover:text-rose-500 transition-colors border border-slate-100" data-action="reset" title="Reset Frame"><i class="fa-solid fa-expand"></i></button>
                </div>
            </div>

        </div>

        <aside class="lg:col-span-4 flex flex-col gap-4 w-full">
            
            <div id="settingsPanel" class="bg-white rounded-3xl p-5 md:p-6 shadow-sm border border-slate-200 opacity-50 pointer-events-none transition-opacity duration-300">
                
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-5 font-mono flex items-center gap-2"><i class="fa-solid fa-wand-magic-sparkles text-emerald-500"></i> Enhancements</h3>
                
                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between text-xs font-bold text-slate-600 mb-2">
                            <span><i class="fa-solid fa-sun mr-1 text-slate-400"></i> Brightness</span>
                            <span id="valBright" class="text-emerald-600 font-mono">100%</span>
                        </div>
                        <input type="range" id="filterBright" class="w-full filter-slider" min="50" max="150" value="100">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs font-bold text-slate-600 mb-2">
                            <span><i class="fa-solid fa-circle-half-stroke mr-1 text-slate-400"></i> Contrast</span>
                            <span id="valContrast" class="text-emerald-600 font-mono">100%</span>
                        </div>
                        <input type="range" id="filterContrast" class="w-full filter-slider" min="50" max="150" value="100">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs font-bold text-slate-600 mb-2">
                            <span><i class="fa-solid fa-droplet mr-1 text-slate-400"></i> Saturation</span>
                            <span id="valSat" class="text-emerald-600 font-mono">100%</span>
                        </div>
                        <input type="range" id="filterSat" class="w-full filter-slider" min="0" max="200" value="100">
                    </div>
                    
                    <button id="resetFiltersBtn" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider hover:text-rose-500 transition-colors w-full text-center mt-2">Reset Adjustments</button>
                </div>

                <div class="mt-6 pt-5 border-t border-slate-100">
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span class="text-[10px] font-black uppercase text-slate-400 font-mono">Output Specs</span>
                        <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">Locked: 600x800px</span>
                    </div>
                </div>
            </div>

            <button id="downloadBtn" disabled class="w-full bg-slate-200 text-slate-400 font-black py-4 rounded-2xl uppercase tracking-wider text-sm transition-all flex items-center justify-center gap-2 pointer-events-none pb-safe">
                <i class="fa-solid fa-cloud-arrow-down text-lg"></i> Save Passport Photo
            </button>

        </aside>

    </main>

    <script>
        let cropper = null;
        let flipX = 1;
        
        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const uploadInput = document.getElementById('imageUpload');
        const workspaceContainer = document.getElementById('workspaceContainer');
        const imageWorkspace = document.getElementById('imageWorkspace');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const settingsPanel = document.getElementById('settingsPanel');

        // Filter Elements
        const fBright = document.getElementById('filterBright');
        const fContrast = document.getElementById('filterContrast');
        const fSat = document.getElementById('filterSat');
        const vBright = document.getElementById('valBright');
        const vContrast = document.getElementById('valContrast');
        const vSat = document.getElementById('valSat');
        const resetFiltersBtn = document.getElementById('resetFiltersBtn');

        // --- 1. Filter Logic ---
        function getFilterString() {
            return `brightness(${fBright.value}%) contrast(${fContrast.value}%) saturate(${fSat.value}%)`;
        }

        function updateFilters() {
            vBright.innerText = fBright.value + '%';
            vContrast.innerText = fContrast.value + '%';
            vSat.innerText = fSat.value + '%';
            
            // Apply to the active cropper images for live preview
            const images = document.querySelectorAll('.cropper-canvas img, .cropper-view-box img');
            images.forEach(img => {
                img.style.filter = getFilterString();
            });
        }

        document.querySelectorAll('.filter-slider').forEach(slider => {
            slider.addEventListener('input', updateFilters);
        });

        resetFiltersBtn.addEventListener('click', () => {
            fBright.value = 100; fContrast.value = 100; fSat.value = 100;
            updateFilters();
        });

        // --- 2. File Upload Handling ---
        dropZone.addEventListener('click', () => uploadInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-emerald-500'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-emerald-500'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('border-emerald-500');
            if (e.dataTransfer.files.length) initCropper(e.dataTransfer.files[0]);
        });
        uploadInput.addEventListener('change', (e) => {
            if (e.target.files.length) initCropper(e.target.files[0]);
        });

        // --- 3. Initialize Engine ---
        function initCropper(file) {
            if (!file.type.startsWith('image/')) { alert("Invalid file type."); return; }

            imageWorkspace.src = URL.createObjectURL(file);
            flipX = 1;
            
            // Reset filters on new upload
            fBright.value = 100; fContrast.value = 100; fSat.value = 100;

            // UI Transitions
            dropZone.classList.add('hidden');
            workspaceContainer.classList.remove('hidden');
            workspaceContainer.classList.add('flex');
            clearBtn.classList.remove('hidden');
            
            // Enable Settings & Download
            settingsPanel.classList.remove('opacity-50', 'pointer-events-none');
            downloadBtn.disabled = false;
            downloadBtn.className = "w-full bg-emerald-600 text-white font-black py-4 rounded-2xl uppercase tracking-wider text-sm shadow-xl hover:bg-emerald-700 hover:shadow-2xl transition-all flex items-center justify-center gap-2 mb-6 md:mb-0";

            if (cropper) cropper.destroy();

            imageWorkspace.classList.remove('hidden');
            cropper = new Cropper(imageWorkspace, {
                aspectRatio: 3 / 4, // Locked to Passport Size
                viewMode: 1, 
                dragMode: 'move', 
                autoCropArea: 0.9,
                background: true,
                guides: true,
                center: true,
                highlight: true,
                responsive: true,
                restore: false,
                ready: function() {
                    updateFilters(); // Apply default filters on load
                }
            });
        }

        // --- 4. Toolbar Actions ---
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!cropper) return;
                const action = this.getAttribute('data-action');
                switch(action) {
                    case 'zoom-in': cropper.zoom(0.1); break;
                    case 'zoom-out': cropper.zoom(-0.1); break;
                    case 'rotate-left': cropper.rotate(-90); break;
                    case 'rotate-right': cropper.rotate(90); break;
                    case 'flip-x': 
                        flipX = flipX === 1 ? -1 : 1;
                        cropper.scaleX(flipX); 
                        break;
                    case 'toggle-guides':
                        const grid = document.querySelector('.cropper-dashed');
                        if(grid) grid.style.display = grid.style.display === 'none' ? 'block' : 'none';
                        break;
                    case 'reset': 
                        cropper.reset(); 
                        flipX = 1; 
                        cropper.scaleX(1); 
                        break;
                }
            });
        });

        // --- 5. Start Over ---
        clearBtn.addEventListener('click', () => {
            if(cropper) { cropper.destroy(); cropper = null; }
            uploadInput.value = '';
            imageWorkspace.src = '';
            
            // Revert UI
            workspaceContainer.classList.add('hidden');
            workspaceContainer.classList.remove('flex');
            dropZone.classList.remove('hidden');
            clearBtn.classList.add('hidden');
            
            // Disable Settings & Download
            settingsPanel.classList.add('opacity-50', 'pointer-events-none');
            downloadBtn.disabled = true;
            downloadBtn.className = "w-full bg-slate-200 text-slate-400 font-black py-4 rounded-2xl uppercase tracking-wider text-sm transition-all flex items-center justify-center gap-2 pointer-events-none";
        });

        // --- 6. Export Final Image with Filters ---
        downloadBtn.addEventListener('click', function() {
            if (!cropper) return;

            // Visual Processing State
            const originalHtml = this.innerHTML;
            this.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-xl"></i> Processing...';
            this.classList.add('opacity-90', 'pointer-events-none');

            setTimeout(() => {
                // Get the raw cropped canvas at exact dimensions
                const rawCanvas = cropper.getCroppedCanvas({
                    width: 600,
                    height: 800,
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });

                // Create a new canvas to apply the CSS filters permanently
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = 600;
                finalCanvas.height = 800;
                const ctx = finalCanvas.getContext('2d');
                
                // Apply filters to the drawing context
                ctx.filter = getFilterString();
                ctx.drawImage(rawCanvas, 0, 0, 600, 800);

                // Export final blob
                finalCanvas.toBlob(function(blob) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = "SSF_Passport_" + Math.floor(Date.now() / 1000) + ".jpg";
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // Restore Button State
                    downloadBtn.innerHTML = originalHtml;
                    downloadBtn.classList.remove('opacity-90', 'pointer-events-none');
                }, 'image/jpeg', 0.95); // High Quality JPEG
            }, 300);
        });
    </script>
</body>
</html>
